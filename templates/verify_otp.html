<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
</head>
<body>

    <h2>OTP Verification</h2>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <label>Enter OTP</label><br>

        <input
            type="text"
            name="otp"
            maxlength="6"
            minlength="6"
            placeholder="Enter 6-digit OTP"
            required
        >

        <br><br>

        <button type="submit">
            Verify OTP
        </button>

    </form>

    <br>

    <a href="/resend-otp">
        Resend OTP
    </a>

</body>
</html>
