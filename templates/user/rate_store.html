{% extends "base.html" %}

{% block title %}
Rate Store
{% endblock %}

{% block content %}

<h2>Rate {{ store.name }}</h2>

<form method="POST">

    <label>Rating (1 - 5)</label>

    <br><br>

    <input
        type="number"
        name="rating"
        min="1"
        max="5"
        value="{% if existing_rating %}{{ existing_rating.rating }}{% endif %}"
        required
    >

    <br><br>

    <button type="submit">

        {% if existing_rating %}
            Update Rating
        {% else %}
            Submit Rating
        {% endif %}

    </button>

</form>

<br>

<a href="/user/stores">Back</a>

{% endblock %}
