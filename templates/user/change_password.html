{% extends "base.html" %}

{% block title %}
Change Password
{% endblock %}

{% block content %}

<h1>Change Password</h1>

<hr>

{% if error %}
<p style="color: red;">
    {{ error }}
</p>
{% endif %}

<form method="POST">

    <label>Current Password</label>
    <br>
    <input
        type="password"
        name="current_password"
        required
    >
    <br><br>

    <label>New Password</label>
    <br>
    <input
        type="password"
        name="new_password"
        required
    >
    <br><br>

    <label>Confirm New Password</label>
    <br>
    <input
        type="password"
        name="confirm_password"
        required
    >
    <br><br>

    <button type="submit">
        Update Password
    </button>

</form>

<br>

<a href="/user/dashboard">← Back to Dashboard</a>

{% endblock %}
